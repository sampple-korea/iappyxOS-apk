name: Build signed APK release

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_FILE: ${{ github.workspace }}/release-key.p12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve upstream commit
        id: upstream
        run: |
          set -euo pipefail
          git fetch https://github.com/iappyx/iappyxOS.git main:refs/remotes/upstream/main
          full_sha="$(git rev-parse refs/remotes/upstream/main)"
          short_sha="$(git rev-parse --short=12 refs/remotes/upstream/main)"
          echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "tag=apk-$short_sha" >> "$GITHUB_OUTPUT"

      - name: Restore signing key
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$ANDROID_STORE_FILE"
          chmod 600 "$ANDROID_STORE_FILE"
          cat > src/container_app/key.properties <<EOF
          storeFile=$ANDROID_STORE_FILE
          storeType=pkcs12
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Build APK
        run: |
          set -euo pipefail
          chmod +x build.sh src/shell_apk/gradlew
          ./build.sh
          test -s bin/iappyxOS.apk

      - name: Verify APK signature
        run: |
          set -euo pipefail
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --print-certs bin/iappyxOS.apk

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          Upstream: https://github.com/iappyx/iappyxOS
          Upstream commit: ${{ steps.upstream.outputs.full_sha }}
          Fork commit: ${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "iappyxOS APK ${{ steps.upstream.outputs.short_sha }}" --notes-file release-notes.md
            gh release upload "$TAG" "bin/iappyxOS.apk#iappyxOS.apk" --clobber
          else
            gh release create "$TAG" "bin/iappyxOS.apk#iappyxOS.apk" --title "iappyxOS APK ${{ steps.upstream.outputs.short_sha }}" --notes-file release-notes.md --target "${{ github.sha }}"
          fi
