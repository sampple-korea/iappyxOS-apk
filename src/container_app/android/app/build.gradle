plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keyPropsFile = rootProject.file('../key.properties')
def keyProps = new Properties()
if (keyPropsFile.exists()) {
    keyProps.load(new FileInputStream(keyPropsFile))
}

android {
    namespace = "com.iappyx.container"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            if (keyPropsFile.exists()) {
                keyAlias keyProps['keyAlias']
                keyPassword keyProps['keyPassword']
                storeFile file(keyProps['storeFile'])
                if (keyProps['storeType']) {
                    storeType keyProps['storeType']
                }
                storePassword keyProps['storePassword']
            }
        }
    }

    defaultConfig {
        applicationId = "com.iappyx.os"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            signingConfig = keyPropsFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

// Keep /SPEC.md (repo root, published canonical copy) in sync with the bundled
// system prompt. Runs before every Gradle build, so any `flutter build apk`
// physically guarantees the two files match — no chance of drift.
task syncSpecMd {
    def src = file("$projectDir/../../assets/system_prompt.md")
    def dst = file("$projectDir/../../../../SPEC.md")
    inputs.file src
    outputs.file dst
    doLast {
        if (src.exists()) {
            dst.text = src.text
            println "✓ SPEC.md synced from system_prompt.md (${src.length()} bytes)"
        } else {
            println "⚠ syncSpecMd: source missing at ${src.absolutePath}"
        }
    }
}
preBuild.dependsOn syncSpecMd
